name: daily-arxiv

# 毎朝 7:00 JST (= 22:00 UTC) に自動実行するワークフロー。
# GitHub Actions の schedule は数十分遅延することがあります(公式仕様)。
# 手動実行(workflow_dispatch)でテストする場合は、Actionsタブから
# 「Run workflow」ボタンを押してください。DRY_RUN を true にすると
# 通知・Issue作成/close・状態ファイル保存を行わず、ログ出力のみで動作確認できます。

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true にするとDRY_RUNモード(通知・書き込みなし)で実行します'
        required: false
        default: 'false'

permissions:
  contents: write   # data/ 配下の状態ファイルをcommitするため
  issues: write      # Issueの作成・closeのため

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存関係をインストール
        run: pip install -r requirements.txt

      - name: Botを実行
        env:
          # 必須: Gemini APIキー(GitHub Secretsに登録してください)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 任意: モデル名を変更したい場合のみSecretsに登録(未設定ならgemini-2.5-flash)
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          # LINE通知(第1優先)。未設定ならメールにフォールバックします
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          # メール通知(第2優先・フォールバック)
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          # Issue作成・フィードバック回収用(追加設定不要)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # 手動実行時にdry_run=trueが指定された場合のみDRY_RUNモードにする
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: python src/main.py

      - name: 状態ファイルをcommit & push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "arxiv-bot"
          git config user.email "arxiv-bot@users.noreply.github.com"
          git add data/seen_ids.json data/feedback.json
          git diff --quiet --cached || git commit -m "chore: update bot state $(date -u +'%Y-%m-%d')"
          git push
