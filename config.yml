# =========================================================
# arxiv-bot 設定ファイル
# ユーザーが編集する唯一のファイルです。
# =========================================================

# 監視対象の arXiv カテゴリ
categories: ["hep-th", "gr-qc", "quant-ph"]

# この点数(0-10)以上のスコアの論文だけ通知する
score_threshold: 6

# 1日に通知する論文の最大件数(スコア降順で上位を採用)
max_papers: 8

# 該当する論文が0件の日にも通知するか
notify_when_empty: true

# LINE通知が成功した場合でも、追加でメールも送るか
always_email: false

# 興味プロファイル。Geminiによる関連度判定・スコアリングの基準文になります。
# 自由に書き換えてください。
interest_profile: |
  高柳匡(Tadashi Takayanagi)の研究領域全般。具体的には:
  ホログラフィックエンタングルメントエントロピー(RT/HRT公式)、AdS/CFT対応、
  量子情報と時空の関係、エンタングルメントウェッジ・バルク再構成、
  ブラックホール情報問題・アイランド公式・量子極値曲面、
  テンソルネットワークと時空の創発(MERA, HaPPY code)、
  ホログラフィック複雑性、pseudo entropy、AdS/BCFT、de Sitterホログラフィー、
  CFTのエンタングルメント構造
